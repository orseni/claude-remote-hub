name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tooling
        run: python -m pip install --upgrade ruff

      - name: Syntax checks
        run: |
          python -m py_compile claude-remote-hub.py
          bash -n install.sh

      - name: Lint
        run: ruff check .

      - name: Unit tests
        run: python -m unittest discover -s tests
